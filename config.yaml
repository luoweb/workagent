# Git Proxy Configuration
# 生产环境配置示例

server:
  # HTTP/HTTPS 监听地址
  host: "0.0.0.0"
  http_port: 8080
  https_port: 8443
  
  # TLS 证书 (仅 HTTPS 需要)
  cert_file: ""
  key_file: ""

# 目标 Git 服务器配置
target:
  # 目标服务器地址 (如 gitlab.example.com)
  host: "github.com"
  port: 443
  
  # 可选认证
  # username 和 password 用于 HTTP/HTTPS 认证
  # 如果留空，则不进行认证
  username: ""
  password: ""
  
  # SSH 配置 (用于 SSH 协议代理)
  # 如果启用 SSH 代理，代理会转发 git@host:repo 的请求
  ssh:
    enabled: true
    # SSH 端口，默认 22
    port: 22

# 日志配置
logging:
  # 日志级别: debug, info, warn, error
  level: "info"
  # 日志格式: json, text
  format: "text"

# 代理行为配置
proxy:
  # 请求超时时间 (秒)
  timeout: 30
  
  # 最大并发连接数
  max_connections: 100
  
  # 是否启用路径重写
  # 开启后，会将 /owner/repo 路径映射到目标服务器
  # 例如: /user/myrepo -> https://github.com/user/myrepo
  path_rewrite: true
  
  # 允许的仓库路径前缀 (可选)
  # 如果设置，只有匹配此前缀的请求才会被代理
  # allowed_paths: []
  
  # 禁止的仓库路径 (可选)
  # blocked_paths: []
