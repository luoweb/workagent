name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        architecture: 'x64'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Lint with flake8
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Test with pytest
      run: |
        pip install pytest
        pytest
  
  package:
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            architecture: x64
          - os: windows-latest
            architecture: x64
          - os: macos-latest
            architecture: x64
          - os: macos-latest
            architecture: arm64
          - os: ubuntu-22.04
            architecture: arm64
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        architecture: ${{ matrix.architecture }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 pyinstaller
        if (Test-Path requirements.txt) { pip install -r requirements.txt }
      shell: pwsh
    
    - name: Build with PyInstaller
      run: |
        # Get architecture
        if ("${{ matrix.os }}" -eq "windows-latest") {
          $arch = $env:PROCESSOR_ARCHITECTURE
        } else {
          $arch = (uname -m)
        }
        # Normalize architecture names
        if ($arch -like "*64*" -and $arch -notlike "*arm*" -and $arch -notlike "*aarch64*") {
          $arch = "x64"
        } elseif ($arch -like "*arm*" -or $arch -like "*aarch64*") {
          $arch = "arm64"
        }
        if ("${{ matrix.os }}" -eq "windows-latest") {
          pyinstaller --onefile --windowed --name git-agent-windows-$arch main.py
        } elseif ("${{ matrix.os }}" -eq "macos-latest") {
          pyinstaller --onefile --windowed --name git-agent-macos-$arch main.py
        } else {
          pyinstaller --onefile --name git-agent-linux-$arch main.py
        }
      shell: pwsh
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: git-agent-${{ matrix.os }}-${{ matrix.architecture }}
        path: dist/
        if-no-files-found: error

  release:
    needs: package
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # - name: Download artifacts
    #   uses: actions/download-artifact@v4
    #   with:
    #     path: artifacts

    # - name: Create Release
    #   id: create_release
    #   uses: softprops/action-gh-release@v2
    #   env:
    #     GITHUB_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
    #   with:
    #     tag_name: v${{ github.run_number }}
    #     name: Release v${{ github.run_number }}
    #     draft: false
    #     prerelease: false
    #     files: artifacts/**/*

    - uses: actions/download-artifact@v7
      with:
        pattern: "git-agent-*"
        path: artifacts
        merge-multiple: true

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        files: |
          artifacts/git-agent-*
        token: ${{ secrets.CI_GITHUB_TOKEN }}
        repository: luoweb/workagent
        prerelease: false