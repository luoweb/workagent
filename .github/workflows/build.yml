name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false

env:
  GO_VERSION: '1.22'
  MAIN_PACKAGE: './cmd/proxy'
  BIN_NAME: 'git-proxy'

jobs:
  build-go:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          # - goos: windows
          #   goarch: amd64
          #   runner: windows-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Get dependencies
        run: |
          rm -f go.sum
          go clean -modcache
          go mod download
          go mod tidy

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          ext=""
          if [[ "$GOOS" == "windows" ]]; then
            ext=".exe"
          fi
          output_name="$BIN_NAME-${GOOS}-${GOARCH}${ext}"
          go build -ldflags="-s -w -X main.version=${GITHUB_REF#refs/tags/}" -o "$output_name" ${{ env.MAIN_PACKAGE }}

      - name: Generate checksums
        shell: bash
        run: |
          ext=""
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            ext=".exe"
          fi
          filename="$BIN_NAME-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"
          sha256sum "$filename" > "${filename}.sha256sum"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ${{ env.BIN_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}*
            config.yaml
            README.md
          retention-days: 30

  release:
    needs: build-go
    # if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

        # Download the .vsix artifacts
      - uses: actions/download-artifact@v7
        with:
          pattern: "git-proxy-*"
          path: artifacts
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/git-proxy-*
          token: ${{ secrets.CI_GITHUB_TOKEN }}
          repository: luoweb/gitproxy
          prerelease: true